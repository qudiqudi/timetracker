<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ears -->
  <polygon points="10,28 18,4 28,24" fill="#FF8C42"/>
  <polygon points="36,24 46,4 54,28" fill="#FF8C42"/>
  <!-- Inner ears -->
  <polygon points="14,26 19,10 25,24" fill="#FFD4A3"/>
  <polygon points="39,24 45,10 50,26" fill="#FFD4A3"/>
  <!-- Head -->
  <ellipse cx="32" cy="38" rx="24" ry="22" fill="#FF8C42"/>
  <!-- Cheeks / face -->
  <ellipse cx="32" cy="42" rx="18" ry="14" fill="#FFF5E6"/>
  <!-- Eyes -->
  <ellipse cx="22" cy="34" rx="3.5" ry="4" fill="#3D2914"/>
  <ellipse cx="42" cy="34" rx="3.5" ry="4" fill="#3D2914"/>
  <!-- Eye shine -->
  <circle cx="23.5" cy="32.5" r="1.2" fill="#fff"/>
  <circle cx="43.5" cy="32.5" r="1.2" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="3" ry="2" fill="#FF6B1A"/>
  <!-- Mouth -->
  <path d="M29,43 Q32,47 35,43" fill="none" stroke="#3D2914" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="4" y1="38" x2="20" y2="40" stroke="#3D2914" stroke-width="0.8" opacity="0.4"/>
  <line x1="4" y1="42" x2="20" y2="42" stroke="#3D2914" stroke-width="0.8" opacity="0.4"/>
  <line x1="4" y1="46" x2="20" y2="44" stroke="#3D2914" stroke-width="0.8" opacity="0.4"/>
  <line x1="60" y1="38" x2="44" y2="40" stroke="#3D2914" stroke-width="0.8" opacity="0.4"/>
  <line x1="60" y1="42" x2="44" y2="42" stroke="#3D2914" stroke-width="0.8" opacity="0.4"/>
  <line x1="60" y1="46" x2="44" y2="44" stroke="#3D2914" stroke-width="0.8" opacity="0.4"/>
  <!-- Stripes on forehead -->
  <path d="M26,22 Q32,28 38,22" fill="none" stroke="#FF6B1A" stroke-width="1.5" opacity="0.5"/>
  <path d="M28,19 Q32,24 36,19" fill="none" stroke="#FF6B1A" stroke-width="1.5" opacity="0.5"/>
  <path d="M30,16 Q32,20 34,16" fill="none" stroke="#FF6B1A" stroke-width="1.5" opacity="0.5"/>
</svg>
