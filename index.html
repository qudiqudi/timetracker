<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Hubi Time Tracker — a playful cat-themed time tracking app. Track your work hours with your favorite orange tabby!">
    <meta name="theme-color" content="#FF8C42">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hubi.work/">
    <meta property="og:title" content="hubi.work — E2E-encrypted time tracker">
    <meta property="og:description" content="Live PWA. Vanilla JS, zero npm deps. AES-256-GCM sync via Web Crypto, Cloudflare Workers + KV backend, Grafana observability.">
    <meta property="og:image" content="https://hubi.work/assets/og-card.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="hubi.work — E2E-encrypted time tracker (orange tabby cat mascot)">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="hubi.work — E2E-encrypted time tracker">
    <meta name="twitter:description" content="Live PWA. Vanilla JS, zero npm deps. AES-256-GCM sync via Web Crypto, Cloudflare Workers + KV backend, Grafana observability.">
    <meta name="twitter:image" content="https://hubi.work/assets/og-card.png">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-kcVPRMHMgcXlh2vuIgCzwqqkrgaK+C8LD0DTWisqdHM='; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; media-src 'self'; connect-src 'self' https://sync.hubi.work">
    <title>Hubi Time Tracker 🐱</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/hubi.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="pet.css">
</head>
<body>
    <div id="app">
        <!-- Dynamic content rendered by app.js -->
    </div>

    <div id="hubi-zone"></div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-page="timer" id="nav-timer">
            <span class="nav-icon">🐾</span>
            <span class="nav-label" data-i18n="navTimer">Timer</span>
        </button>
        <button class="nav-btn" data-page="history" id="nav-history">
            <span class="nav-icon">📋</span>
            <span class="nav-label" data-i18n="navHistory">History</span>
        </button>
        <button class="nav-btn" data-page="stats" id="nav-stats">
            <span class="nav-icon">📊</span>
            <span class="nav-label" data-i18n="navStats">Stats</span>
        </button>
        <button class="nav-btn" data-page="sync" id="nav-sync">
            <span class="nav-icon">🔗</span>
            <span class="nav-label" data-i18n="navSync">Sync</span>
        </button>
    </nav>

    <script src="i18n.js"></script>
    <script src="qrcodegen.js"></script>
    <script src="qr.js"></script>
    <script src="messages.js"></script>
    <script src="app.js"></script>
    <script src="sync.js"></script>
    <script src="pet.js"></script>
    <script>
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
            const s = document.createElement('script');
            s.src = 'dev.js';
            document.body.appendChild(s);
        }
    </script>
</body>
</html>
