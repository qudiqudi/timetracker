<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Hubi Time Tracker — a playful cat-themed time tracking app. Track your work hours with your favorite orange tabby!">
    <meta name="theme-color" content="#FF8C42">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hubi Time Tracker 🐱</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/hubi.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="pet.css">
</head>
<body>
    <div id="app">
        <!-- Dynamic content rendered by app.js -->
    </div>

    <div id="hubi-zone"></div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-page="timer" id="nav-timer">
            <span class="nav-icon">🐾</span>
            <span class="nav-label" data-i18n="navTimer">Timer</span>
        </button>
        <button class="nav-btn" data-page="history" id="nav-history">
            <span class="nav-icon">📋</span>
            <span class="nav-label" data-i18n="navHistory">History</span>
        </button>
        <button class="nav-btn" data-page="stats" id="nav-stats">
            <span class="nav-icon">📊</span>
            <span class="nav-label" data-i18n="navStats">Stats</span>
        </button>
    </nav>

    <script src="i18n.js"></script>
    <script src="app.js"></script>
    <script src="pet.js"></script>
</body>
</html>
